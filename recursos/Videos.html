<h3>Representación gráfica</h3>

<svg height="200">
  <!-- Punto -->
  <circle cx="50" cy="50" r="4" fill="black"/>
  <text x="55" y="45">A</text>

  <!-- Recta -->
  <line x1="20" y1="100" x2="200" y2="100" stroke="black"/>
   <polygon points="20,100 30,95 30,105" fill="black"/>
  <polygon points="200,100 190,95 190,105" fill="black"/>

  <text x="210" y="105">Recta</text>

  <!-- Segmento -->
  <line x1="20" y1="150" x2="100" y2="150" stroke="black" stroke-width="2"/>
  <circle cx="20" cy="150" r="3"/>
  <circle cx="100" cy="150" r="3"/>
  <text x="110" y="155">Segmento</text>

  <!-- Rayo -->
  <line x1="20" y1="180" x2="150" y2="180" stroke="black"/>
  <polygon points="150,180 140,175 140,185" fill="black"/>
  <circle cx="20" cy="180" r="3"  fill="none" fill="none"  stroke-width="2"/>
  <text x="160" y="185">Semirrecta (rayo)</text>
</svg>
<svg width="200" height="100">
  <circle cx="50" cy="50" r="10" fill="blue">
    <animate attributeName="cx" from="50" to="150" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
<svg width="200" height="200">
  <circle cx="100" cy="100" r="3" 
          fill="none" 
          stroke="black" 
          stroke-width="2"/>
</svg>
