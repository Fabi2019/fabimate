<h3>Dibujo explicativo</h3>

<svg viewBox="0 0 400 300">

  <!-- Triángulo -->
  <polygon points="100,250 320,250 220,80" 
  style="fill:none;stroke:black;stroke-width:2"/>

  <!-- Lados -->
  <text x="200" y="270">a</text>
  <text x="290" y="170">b</text>
  <text x="140" y="170">c</text>

  <!-- Ángulos -->
  <text x="215" y="70">A</text>
  <text x="85" y="265">B</text>
  <text x="325" y="265">C</text>

  <!-- Líneas punteadas para claridad -->
  <line x1="220" y1="80" x2="220" y2="250" 
  stroke="gray" stroke-dasharray="5,5"/>

  <!-- Etiquetas explicativas -->
  <text x="220" y="190" font-size="12">altura</text>

</svg>

<p>
En este triángulo:
</p>
<ul>
<li>El lado <b>a</b> está frente al ángulo <b>A</b></li>
<li>El lado <b>b</b> está frente al ángulo <b>B</b></li>
<li>El lado <b>c</b> está frente al ángulo <b>C</b></li>
</ul>

<p>
Esto permite aplicar:
</p>

<p>
$$
\frac{a}{\sen(A)} = \frac{b}{\sen(B)} = \frac{c}{\sen(C)}
$$
</p>
