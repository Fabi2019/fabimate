</head>
<body>

    <nav>
        <h1 id="titulo-web">...</h1>
        <div id="menu-dinamico">
            </div>
    </nav>

    <main id="contenido-principal">
        <h2>Bienvenido</h2>
        <p>Selecciona una opción del menú.</p>
        <div class="contenedor-imagen">
        <img src="horario.jpeg" alt="Descripción de la imagen">
    </div>
    </main>

    <script>
        let datosGlobales = null;

        async function inicializarPagina() {
            try {
                const respuesta = await fetch('datos.json');
                datosGlobales = await respuesta.json();

                // 1. Poner el título desde el JSON
                document.getElementById('titulo-web').innerText = datosGlobales.configuracion.titulo_pagina;
                document.getElementById('tag-titulo').innerText = datosGlobales.configuracion.titulo_pagina;

                // 2. Crear los botones del menú dinámicamente
                const contenedorMenu = document.getElementById('menu-dinamico');
                datosGlobales.configuracion.menu.forEach(item => {
                    const boton = document.createElement('button');
                    boton.className = 'btn-menu';
                    boton.innerText = item.texto;
                    // Al hacer clic, carga la categoría correspondiente
                    boton.onclick = () => mostrarContenido(item.clave, item.texto);
                    contenedorMenu.appendChild(boton);
                });

            } catch (e) {
                console.error("Error inicializando:", e);
            }
        }

        function mostrarContenido(clave, nombreVisible) {
            const contenedor = document.getElementById('contenido-principal');
            const lista = datosGlobales[clave];
            
            let html = `<h2>${nombreVisible}</h2>`;
            html += `<div class="card-container">`;
            lista.forEach(item => {
                html += `<a href="${item.url}" class="link-card" target="_blank">${item.nombre}</a>`;
            });
            html += `</div>`;
            
            contenedor.innerHTML = html;
        }

        // Arrancamos la carga al abrir la página
        inicializarPagina();
    </script>
</body>
</html>
