<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Datos de Apps Script</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .url-link {
            display: inline-block;
            background-color: #e9ecef;
            color: #0056b3;
            padding: 2px 6px;
            margin: 2px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
        }
        .url-link:hover {
            background-color: #0056b3;
            color: white;
        }
        #estado {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <h2>Datos Solicitados desde el Script</h2>
    <p id="estado">Cargando datos desde la API...</p>
    <p id="nivel">nivel...</p>

    <table id="tablaDatos">
        <thead>
            <tr>
                <!-- <th>Fecha</th>
                <th>Nivel</th> -->
                <th>Habilidades</th>
                <th>URLs</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        // Pega aquí la URL de ejecución de tu Web App de Google Apps Script
        //const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwMRUBGACKdZ-b84FZkyjR-ooK4PeXUwp-zZQCHXx-SCTKOIykU_i_VE81LT_eqJCPUJQ/exec?nivel=octavo&fecha=25/05/2026";
        var URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwMRUBGACKdZ-b84FZkyjR-ooK4PeXUwp-zZQCHXx-SCTKOIykU_i_VE81LT_eqJCPUJQ/exec";
       
        const urlParams = new URLSearchParams(window.location.search);
        const paramNivel = urlParams.get('nivel'); // Busca '?nivel=...'
        const paramFecha = urlParams.get('fecha'); // Busca '?fecha=...'
        var vnivel =document.getElementById("nivel")
        vnivel.innertText=paramNivel
    alert(paramNivel)
        URL_SCRIPT=URL_SCRIPT+"?nivel="+paramNivel+"&fecha="+paramFecha

        async function cargarDatos() {
            const tbody = document.querySelector("#tablaDatos tbody");
            const estadoTxt = document.getElementById("estado");

            try {
                // 1. Hacemos la petición a la URL del Script
                const respuesta = await fetch(URL_SCRIPT);
                
                if (!respuesta.ok) throw new Error("Error en la respuesta del servidor");
                
                const datos = await respuesta.json();

                // Limpiamos el texto de estado
                estadoTxt.style.display = "none";

                // 2. Recorremos el JSON recibido para armar las filas
                datos.forEach(item => {
                    const fila = document.createElement("tr");

                    // Manejo de URLs: Si vienen como Array o como String separado por comas
                    let enlacesHtml = "";
                    if (item.notas) {
                        // Si es un String separado por comas, lo pasamos a Array. Si ya es Array, lo deja igual.
                        const listaUrls = typeof item.notas === "string" ? item.notas.split(",") : item.notas;
                        
                        // Creamos un botón/enlace HTML cliqueable por cada URL
                        enlacesHtml = listaUrls.map((link, indice) => {
                            const urlLimpia = link.trim();
                            return `<a class="url-link" href="${urlLimpia}" target="_blank">Enlace ${indice + 1}</a>`;
                        }).join(" ");
                    }
                    //<!-- <td>${item.fecha || ''}</td>
                      //  <td>${item.nivel || ''}</td> -->
                    // 3. Inyectamos las celdas con las propiedades del JSON
                    fila.innerHTML = `
                       
                        <td>${item.labor|| ''}</td>
                        <td>${enlacesHtml || 'Sin enlaces'}</td>
                    `;

                    // Añadimos la fila a la tabla
                    tbody.appendChild(fila);
                });

            } catch (error) {
                console.error("Error al traer datos:", error);
                estadoTxt.innerText = "Error al cargar los datos. Revisa la consola o los permisos CORS.";
                estadoTxt.style.color = "red";
            }
        }

        // Ejecutar la función automáticamente al abrir la página
        window.onload = cargarDatos;
    </script>

</body>
</html>
