<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor de Iframe de Preguntas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h2 { color: #2c3e50; text-align: center; }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="url"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            word-break: break-all;
            display: none;
        }
        .exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .cargando { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="box">
    <h2>Detector de URL de Preguntas</h2>
    <p>Introduce la URL de la página web que quieres analizar:</p>
    
    <input type="url" id="urlInput" placeholder="https://ejemplo.com/pagina-con-formulario" required>
    <button onclick="buscarIframe()">Analizar Página</button>

    <div id="resultado"></div>
</div>

<script>
async function buscarIframe() {
    const urlObjetivo = document.getElementById('urlInput').value.trim();
    const divResultado = document.getElementById('resultado');
    
    if (!urlObjetivo) {
        mostrarResultado("Por favor, introduce una URL válida.", "error");
        return;
    }

    mostrarResultado("Analizando la página web... Por favor, espera.", "cargando");

    // Usamos un proxy público para saltarnos el bloqueo CORS
    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
    
    try {
        // Intentamos obtener el HTML de la página objetivo
        const respuesta = await fetch(proxyUrl + urlObjetivo);
        
        if (!respuesta.ok) {
            throw new Error("No se pudo acceder a la página web externa.");
        }
        
        const htmlTexto = await respuesta.text();

        // Creamos un documento virtual para poder usar querySelector como en el DOM
        const parser = new DOMParser();
        const docVirtual = parser.parseFromString(htmlTexto, 'text/html');
        
        // 1. Capturamos los iframes del documento virtual
        const todosLosIframes = docVirtual.querySelectorAll('iframe');
        let urlPreguntas = null;

        todosLosIframes.forEach((iframe) => {
            const url = iframe.src || iframe.getAttribute('data-src') || '';
            
            // Filtro de palabras clave para detectar formularios/preguntas
            const esPreguntas = url.includes('forms') || 
                                url.includes('quiz') || 
                                url.includes('question') || 
                                url.includes('survey') || 
                                url.includes('typeform') ||
                                url.includes('preguntas'); // Añadido en español por si acaso

            if (esPreguntas && !urlPreguntas) {
                urlPreguntas = url;
            }
        });

        // 2. Presentar el resultado en la interfaz
        if (urlPreguntas) {
            mostrarResultado(`<strong>¡URL Encontrada!</strong><br><br><a href="${urlPreguntas}" target="_blank">${urlPreguntas}</a>`, "exito");
        } else {
            mostrarResultado("❌ No se encontró ningún iframe de preguntas o cuestionarios en esa página.", "error");
        }

    } catch (error) {
        console.error(error);
        mostrarResultado("⚠️ Error al conectar. Nota: Si es la primera vez que lo usas, es posible que debas entrar a <a href='https://cors-anywhere.herokuapp.com/corsdemo' target='_blank'>este enlace</a> y pulsar el botón para activar temporalmente el proxy de prueba.", "error");
    }
}

function mostrarResultado(mensaje, clase) {
    const divResultado = document.getElementById('resultado');
    divResultado.className = clase;
    divResultado.innerHTML = mensaje;
    divResultado.style.display = "block";
}
</script>

</body>
</html>
